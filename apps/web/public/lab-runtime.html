<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <!-- Pyodide 314 的 Emscripten 运行代码需要 eval；该权限只存在于无同源身份的 sandbox 文档。 -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://cdn.jsdelivr.net/npm/pyodide@314.0.2/; worker-src blob:; connect-src https://cdn.jsdelivr.net/npm/pyodide@314.0.2/; base-uri 'none'; form-action 'none'; object-src 'none'"
    >
    <title>隔离的 Python 课程运行时</title>
  </head>
  <body>
    <script>
      (() => {
        "use strict";
        const protocol = "mambo-lab-runtime-v1";
        let channelToken = null;
        let runtimeWorker = null;
        let workerUrl = null;

        const sendToParent = (type, detail = {}) => {
          parent.postMessage({ protocol, type, token: channelToken, ...detail }, "*");
        };

        const disposeWorker = () => {
          runtimeWorker?.terminate();
          runtimeWorker = null;
          if (workerUrl) URL.revokeObjectURL(workerUrl);
          workerUrl = null;
        };

        const initialize = (message) => {
          if (channelToken !== null) return;
          if (typeof message.token !== "string" || message.token.length < 20) return;
          if (typeof message.coreSource !== "string" || message.coreSource.length > 100000) return;
          if (typeof message.workerSource !== "string" || message.workerSource.length > 100000) return;

          channelToken = message.token;
          const source = `${message.coreSource}\n${message.workerSource}`;
          workerUrl = URL.createObjectURL(new Blob([source], { type: "text/javascript" }));
          runtimeWorker = new Worker(workerUrl, { type: "module", name: "mambo-isolated-python" });
          runtimeWorker.onmessage = (event) => {
            sendToParent("runtime-message", { payload: event.data });
          };
          runtimeWorker.onerror = () => {
            sendToParent("runtime-error", { message: "Python Worker 发生错误，请重试加载。" });
          };
        };

        addEventListener("message", (event) => {
          if (event.source !== parent || !event.data || event.data.protocol !== protocol) return;
          const message = event.data;
          if (message.type === "initialize") {
            initialize(message);
            return;
          }
          if (message.token !== channelToken) return;
          if (message.type === "runtime-command") {
            runtimeWorker?.postMessage(message.payload);
          } else if (message.type === "dispose") {
            disposeWorker();
          }
        });

        parent.postMessage({ protocol, type: "runtime-bootstrap" }, "*");
      })();
    </script>
  </body>
</html>
